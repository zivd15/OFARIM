<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#152020">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/images/icon-192.png">
<title>OFARIM — מדיניות ביטולים</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans Hebrew', sans-serif;
    background: #F4F7F6;
    color: #152020;
    min-height: 100vh;
  }
  nav {
    background: #152020;
    border-bottom: 1px solid rgba(160,204,193,0.15);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  nav a { text-decoration: none; color: #A0CCC1; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
  nav a img { height: 36px; width: auto; }
  nav .back { font-size: 0.82rem; font-weight: 400; color: #A0CCC1; border: 1px solid rgba(160,204,193,0.25); padding: 6px 14px; text-decoration: none; transition: all .2s; border-radius: 7px; }
  nav .back:hover { background: rgba(160,204,193,0.1); color: #fff; }

  .page { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }

  .doc-header { margin-bottom: 40px; padding-bottom: 24px; border-bottom: 2px solid rgba(168,143,100,0.25); }
  .doc-header .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 3px; color: #4E7772; font-weight: 600; margin-bottom: 10px; }
  .doc-header h1 { font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: 8px; color: #152020; }
  .doc-header .updated { font-size: 0.82rem; color: #5a7a76; }

  .section { margin-bottom: 36px; }
  .section h2 {
    font-size: 0.95rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
    color: #152020; margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 2px solid #A0CCC1;
  }
  .section h2 .num { color: #4E7772; margin-left: 8px; }
  .section p { font-size: 0.92rem; line-height: 1.8; color: #3a5a56; margin-bottom: 12px; }
  .section p:last-child { margin-bottom: 0; }
  .section strong { color: #152020; font-weight: 700; }

  .highlight {
    background: rgba(160,152,80,0.10); border-right: 3px solid #A09850;
    padding: 12px 16px; margin: 16px 0; font-size: 0.88rem; line-height: 1.7; color: #3a5a56;
  }
  .info-box {
    background: rgba(78,119,114,0.07); border-right: 3px solid #4E7772;
    padding: 12px 16px; margin: 16px 0; font-size: 0.88rem; line-height: 1.7; color: #3a5a56;
  }

  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: #5a7a76;
    font-size: 0.92rem;
    line-height: 1.8;
  }
  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .other-docs {
    margin-top: 48px; padding: 20px 24px;
    background: #fff; border: 1px solid rgba(78,119,114,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .other-docs p { font-size: 0.88rem; color: #5a7a76; }
  .other-docs-links { display: flex; gap: 16px; }
  .other-docs a { font-size: 0.85rem; font-weight: 700; color: #4E7772; text-decoration: none; border-bottom: 1px solid rgba(78,119,114,0.3); white-space: nowrap; }
  .other-docs a:hover { border-color: #4E7772; color: #152020; }

  footer { text-align: center; padding: 24px; font-size: 0.75rem; color: #5a7a76; }
</style>
</head>
<body>

<nav>
  <a href="/"><img src="/images/logo.png" alt="עופרים"></a>
  <a class="back" href="/">← חזרה לדף הבית</a>
</nav>

<div class="page">

  <div class="doc-header">
    <p class="label">מסמך משפטי</p>
    <h1>מדיניות ביטולים</h1>
    <p class="updated">עודכן לאחרונה: יוני 2026</p>
  </div>

  <div class="empty-state">
    <div class="icon">📋</div>
    <p>מדיניות הביטולים המלאה תפורסם בקרוב.</p>
  </div>

  <div class="other-docs">
    <p>מסמכים נוספים</p>
    <div class="other-docs-links">
      <a href="/terms">תקנון ותנאי שימוש ←</a>
      <a href="/privacy">מדיניות פרטיות ←</a>
    </div>
  </div>

</div>

<footer>עופרים &copy; 2026<br><span style="font-size:10px;color:#A0CCC1;">נבנה על ידי High Standard Solution</span></footer>

</body>
</html>
