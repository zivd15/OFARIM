<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5a4a32">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/images/logo.png">
<title>Ofarim — לוח אירועים</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { sans: ['Noto Sans Hebrew', 'sans-serif'] },
    colors: { primary: '#4E7772', secondary: '#A09850', bgLight: '#F4F7F6', textDark: '#152020', tealLight: '#A0CCC1', sage: '#7A9D78', rose: '#D4878A', purple: '#9A77B8' }
  }}
}
</script>
<style>
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .spinner { border: 3px solid #dde8e7; border-top: 3px solid #4E7772; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  body { background: #F4F7F6 !important; }
  header { background: #152020 !important; border-color: rgba(160,204,193,0.15) !important; }
  header a, header span, header button { color: #A0CCC1 !important; }
  header button:hover { color: #D4878A !important; }
  .sw-banner {
    display: none; position: fixed; bottom: 20px; right: 50%; transform: translateX(50%);
    z-index: 999; background: #152020; color: #A0CCC1;
    padding: 12px 18px; border-radius: 12px;
    box-shadow: 0 4px 20px rgba(21,32,32,0.25);
    font-size: 13px; font-weight: 600; font-family: 'Noto Sans Hebrew', sans-serif;
    align-items: center; gap: 12px; white-space: nowrap;
  }
  .sw-banner-btn {
    background: #A0CCC1; color: #152020;
    border: none; border-radius: 7px;
    padding: 6px 14px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body class="bg-bgLight font-sans text-textDark">
<div class="sw-banner" id="swBanner" style="display:none;">
  עדכון זמין
  <button class="sw-banner-btn" onclick="window.location.reload()">עדכן עכשיו</button>
</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function getUserToken() { return localStorage.getItem('ofarim_user_token'); }
function getUserData() { try { return JSON.parse(localStorage.getItem('ofarim_user')); } catch(e) { return null; } }

function logout() {
  localStorage.removeItem('ofarim_user_token');
  localStorage.removeItem('ofarim_user');
  window.location.href = '/';
}

// User-friendly Hebrew date. Built from parts so a 'YYYY-MM-DD' string isn't shifted by UTC parsing.
const heDateFmt = new Intl.DateTimeFormat('he-IL', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
function formatHeDate(dateStr) {
  const [y, m, d] = (dateStr || '').split('-').map(Number);
  if (!y) return dateStr || '';
  return heDateFmt.format(new Date(y, m - 1, d));
}

async function apiFetch(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  const token = getUserToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch('/api' + url, { ...options, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Price Badge ─────────────────────────────────────────
// Sharp corners + high contrast: free = solid green, paid = solid black.
function fmtPrice(agorot) {
  const ils = agorot / 100;
  return ils % 1 === 0 ? `₪${ils}` : `₪${ils.toFixed(2)}`;
}

function PriceBadge({ price, className = '' }) {
  const free = !price || price <= 0;
  return (
    <span className={`inline-block text-xs font-bold px-2 py-0.5 ${free ? 'bg-emerald-600 text-white' : 'bg-gray-900 text-white'} ${className}`}>
      {free ? 'חינם' : fmtPrice(price)}
    </span>
  );
}

// ─── Month Navigator ─────────────────────────────────────
function MonthNavigator({ month, year, onPrev, onNext }) {
  const names = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return (
    <div className="flex justify-between items-center mb-4">
      <button onClick={onPrev} className="p-2 px-4 hover:bg-gray-100 rounded-lg transition text-lg font-bold text-primary">▶</button>
      <h2 className="text-xl font-bold">{names[month]} {year}</h2>
      <button onClick={onNext} className="p-2 px-4 hover:bg-gray-100 rounded-lg transition text-lg font-bold text-primary">◀</button>
    </div>
  );
}

// ─── Event Pill (on calendar day) ────────────────────────
function EventPill({ event, onClick }) {
  return (
    <div onClick={(e) => { e.stopPropagation(); onClick(event); }}
      className="cursor-pointer hover:opacity-80 transition mb-0.5 rounded"
      style={{ backgroundColor: event.color || '#3498db', height: '6px', width: '100%' }}
      title={event.title} />
  );
}

// ─── Day Popup (click on a calendar day) ─────────────────
function DayPopup({ day, month, year, events, onEventClick, onClose }) {
  const names = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const dayNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const date = new Date(year, month, day);
  const dayName = dayNames[date.getDay()];
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:9999,
      background:'rgba(0,0,0,0.45)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:'16px'
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:'#fff', borderRadius:'18px',
        boxShadow:'0 20px 60px rgba(0,0,0,0.2)',
        width:'100%', maxWidth:'420px',
        maxHeight:'80vh', display:'flex', flexDirection:'column',
        fontFamily:'Noto Sans Hebrew, sans-serif'
      }}>
        {/* Header */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'16px 20px', borderBottom:'1px solid #eee'}}>
          <div>
            <div style={{fontWeight:700, fontSize:'17px', color:'#152020'}}>{dayName}, {day} ב{names[month]}</div>
            <div style={{fontSize:'11px', color:'#5a7a76', marginTop:'2px'}}>
              {events.length === 0 ? 'אין אירועים בתאריך זה' : `${events.length} אירועים`}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', fontSize:'20px', cursor:'pointer', color:'#999', lineHeight:1, padding:'4px'}}>✕</button>
        </div>
        {/* Body */}
        <div style={{padding:'12px 16px', overflowY:'auto', display:'flex', flexDirection:'column', gap:'10px'}}>
          {events.length === 0 ? (
            <p style={{textAlign:'center', color:'#9ca3af', fontSize:'14px', padding:'32px 0'}}>אין אירועים בתאריך זה</p>
          ) : events.map(ev => {
            const full = ev.spots_left !== null && ev.spots_left <= 0;
            return (
              <div key={ev.id} onClick={() => { onClose(); onEventClick(ev); }} style={{
                display:'flex', alignItems:'flex-start', gap:'12px',
                padding:'12px', borderRadius:'12px',
                border:'1px solid #e5e7eb', cursor:'pointer',
                transition:'background 0.15s'
              }}
              onMouseEnter={e => e.currentTarget.style.background='#f9fafb'}
              onMouseLeave={e => e.currentTarget.style.background='#fff'}>
                <div style={{width:'4px', alignSelf:'stretch', borderRadius:'4px', background: ev.color || '#4E7772', flexShrink:0}}></div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:600, fontSize:'14px', color:'#152020', marginBottom:'3px'}}>{ev.title}</div>
                  {ev.time && <div style={{fontSize:'12px', color:'#6b7280'}}>{ev.time}{ev.end_time ? ` - ${ev.end_time}` : ''}</div>}
                  {ev.location && <div style={{fontSize:'12px', color:'#6b7280'}}>{ev.location}</div>}
                  <div style={{fontSize:'12px', fontWeight:600, marginTop:'4px', color: full ? '#ef4444' : '#16a34a'}}>
                    {full ? 'הרשמה מלאה' : 'יש מקום פנוי'}
                  </div>
                </div>
                <span style={{color:'#d1d5db', fontSize:'14px', flexShrink:0, marginTop:'2px'}}>›</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── Day Grid ────────────────────────────────────────────
function DayGrid({ month, year, events, onEventClick, onDayClick }) {
  const daysOfWeek = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const firstDay = new Date(year, month, 1);
  const startDay = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  const cells = [];
  for (let i = 0; i < startDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const getEventsForDay = (day) => {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    return events.filter(e => e.date === dateStr);
  };

  const isToday = (day) => today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;

  return (
    <div>
      <div className="grid grid-cols-7 gap-1 mb-1">
        {daysOfWeek.map(d => (
          <div key={d} className="text-center text-xs font-semibold text-gray-500 py-2">{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((day, i) => {
          const dayEvents = day ? getEventsForDay(day) : [];
          const ev = dayEvents[0];   // one event per day — let it fill the whole cell
          const today = isToday(day);
          // Event day: fill the cell with the event colour and show the FULL name
          // (wrapped, never truncated). The cell grows taller for long names so the
          // whole title is always visible. Day number tucked in the corner.
          if (day && ev) {
            return (
              <div key={i} onClick={() => onEventClick(ev)} title={ev.title}
                className={`min-h-[100px] p-1 rounded-lg border cursor-pointer hover:opacity-90 transition flex flex-col overflow-hidden
                  ${today ? 'border-primary ring-2 ring-primary/40' : 'border-transparent'}`}
                style={{ backgroundColor: ev.color || '#3498db' }}>
                <div className="text-[10px] font-bold leading-none text-white/90"
                  style={{ textShadow: '0 1px 2px rgba(0,0,0,.35)' }}>{day}</div>
                <div className="flex-1 flex items-center justify-center min-h-0 px-0.5 py-0.5">
                  <div className="text-white text-center font-semibold leading-tight break-words text-[10px] sm:text-xs line-clamp-4"
                    style={{ textShadow: '0 1px 2px rgba(0,0,0,.4)' }}>{ev.title}</div>
                </div>
              </div>
            );
          }
          // Empty day: same height as event cells so rows stay even.
          return (
            <div key={i} onClick={() => day && onDayClick(day, dayEvents)}
              className={`min-h-[100px] p-1 rounded-lg border transition
                ${day ? 'cursor-pointer hover:border-primary/50' : 'border-transparent'}
                ${today ? 'border-primary bg-blue-50 ring-2 ring-primary/20' : 'border-gray-200 bg-white'}`}>
              {day && (
                <div className={`text-sm font-semibold ${today ? 'text-primary' : 'text-gray-700'}`}>{day}</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Event Detail + Sign Up Modal ────────────────────────
function EventModal({ event, onClose, onRegistered }) {
  const userData = getUserData();
  const [name, setName] = useState(userData?.name || '');
  const [phone, setPhone] = useState(userData?.phone || '');
  const [email, setEmail] = useState(userData?.email || '');
  const [ticketType, setTicketType] = useState('single');
  const [notes, setNotes] = useState('');
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [loading, setLoading] = useState(false);
  const [showCalendarBtn, setShowCalendarBtn] = useState(false);
  const [registered, setRegistered] = useState(false);

  useEffect(() => {
    if (!getUserToken()) return;
    apiFetch('/user-auth/me').then(user => {
      if (user.name)  setName(user.name);
      if (user.phone) setPhone(user.phone);
      if (user.email) setEmail(user.email);
    }).catch(() => {});
  }, []);

  const isFull = event.spots_left !== null && event.spots_left <= 0;

  // Couple ticket needs 2 free spots; single needs 1.
  const spotsNeeded = ticketType === 'couple' ? 2 : 1;
  const notEnoughRoom = event.spots_left !== null && event.spots_left < spotsNeeded;

  // Displayed price changes with the ticket selection.
  const displayPrice = ticketType === 'couple'
    ? (event.couple_price || 0)
    : (event.price || 0);

  async function handleRegister(e) {
    e.preventDefault();
    setError(''); setSuccess('');
    if (!name.trim()) return setError('שם הוא שדה חובה');
    if (!phone.trim()) return setError('טלפון הוא שדה חובה');
    if (!email.trim()) return setError('אימייל הוא שדה חובה');
    setLoading(true);
    try {
      const data = await apiFetch(`/events/${event.id}/register`, {
        method: 'POST',
        body: JSON.stringify({ name, phone, email, ticket_type: ticketType, notes }),
      });
      setSuccess(data.message || 'נרשמת בהצלחה!');
      setShowCalendarBtn(true);
      setRegistered(true);
      onRegistered();
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 fade-in max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-start mb-4">
          <div>
            <div className="flex items-center gap-2 flex-wrap">
              <h3 className="text-xl font-bold">{event.title}</h3>
            </div>
            <div className="flex flex-wrap gap-2 mt-1 text-sm text-gray-500">
              <span>📅 {formatHeDate(event.date)}</span>
              {event.time && <span>🕐 {event.time}{event.end_time ? ` - ${event.end_time}` : ''}</span>}
              {event.location && <span>📍 {event.location}</span>}
            </div>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>

        {event.description && (
          <p className="text-gray-600 text-sm mb-4 whitespace-pre-wrap">{event.description}</p>
        )}

        {/* Availability */}
        <div className={`mb-4 px-4 py-3 rounded-lg text-sm font-semibold ${isFull ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-700'}`}>
          {isFull ? 'הרשמה מלאה' : 'יש מקום פנוי'}
        </div>

        {/* Ticket type selector — shown only when the event allows couples */}
        {!isFull && event.allow_couples ? (
          <div className="mb-4">
            <p className="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">סוג כרטיס</p>
            <div className="grid grid-cols-2 gap-2">
              {[
                { value: 'single', label: 'כרטיס יחיד', price: event.price || 0 },
                { value: 'couple', label: 'כרטיס זוגי', price: event.couple_price || 0 },
              ].map(opt => {
                const active = ticketType === opt.value;
                const freeLabel = opt.price <= 0 ? 'חינם' : fmtPrice(opt.price);
                return (
                  <button key={opt.value} type="button" onClick={() => setTicketType(opt.value)}
                    style={active ? { background: '#152020', color: '#A0CCC1', border: '2px solid #152020' } : { background: '#fff', color: '#152020', border: '2px solid #e5e7eb' }}
                    className="rounded-xl py-3 px-4 flex flex-col items-center gap-1 transition font-semibold text-sm">
                    <span>{opt.label}</span>
                    <span style={{ fontSize: '11px', opacity: 0.75 }}>{freeLabel}</span>
                  </button>
                );
              })}
            </div>
            {notEnoughRoom && (
              <p className="text-red-500 text-xs mt-2 font-semibold">אין מספיק מקומות פנויים לכרטיס זוגי.</p>
            )}
          </div>
        ) : null}

        {/* Dynamic price display */}
        {!isFull && (
          <div className="mb-4 flex items-center justify-between px-4 py-2.5 rounded-lg" style={{background:'#f8f9fa'}}>
            <span className="text-sm font-semibold text-gray-600">מחיר לתשלום</span>
            <span className="font-bold text-base" style={{color:'#152020'}}>
              {displayPrice <= 0 ? 'חינם' : fmtPrice(displayPrice)}
            </span>
          </div>
        )}

        {/* Registration form */}
        {!isFull && !notEnoughRoom ? (
          <>
            <h4 className="font-semibold text-sm mb-3">הרשמה לאירוע</h4>
            {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-3 text-sm">{error}</div>}
            {success && <div className="bg-green-50 text-green-600 p-3 rounded-lg mb-3 text-sm">{success}</div>}
            {registered ? (() => {
              const d = event.date ? event.date.replace(/-/g,'') : '';
              const startT = event.time ? event.time.replace(':','') + '00' : '';
              const endT   = event.end_time ? event.end_time.replace(':','') + '00' : (startT ? String(Number(startT.slice(0,4)) + 100).padStart(4,'0') + '00' : '');
              const dates  = startT ? `${d}T${startT}/${d}T${endT}` : `${d}/${d}`;
              const gcal   = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.title)}&dates=${dates}&details=${encodeURIComponent(event.description||'')}&location=${encodeURIComponent(event.location||'')}`;
              const isPaid = displayPrice > 0;
              return (
                <>
                  {/* Payment block — shown only for paid events */}
                  {isPaid && (
                    <div className="mb-3 border-2 border-amber-400" style={{background:'#fffbeb'}}>
                      <div className="flex items-center gap-2 px-4 py-2.5 border-b border-amber-300" style={{background:'#fef08a'}}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#92400e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        <span className="text-xs font-black uppercase tracking-wide" style={{color:'#92400e'}}>נדרש תשלום לאישור המקום</span>
                      </div>
                      <div className="px-4 py-3">
                        <div className="flex items-center justify-between mb-2">
                          <span className="text-sm text-gray-600">סכום לתשלום</span>
                          <span className="font-black text-lg" style={{color:'#152020'}}>{fmtPrice(displayPrice)}</span>
                        </div>
                        <p className="text-xs text-gray-500 mb-3">יש לשלם כדי לאשר את שריון מקומך. ללא תשלום ייתכן ביטול ההרשמה.</p>
                        {event.payment_link ? (
                          <a href={event.payment_link} target="_blank" rel="noopener noreferrer"
                            className="flex items-center justify-center gap-2 w-full py-3 font-black text-sm uppercase tracking-widest transition"
                            style={{textDecoration:'none', background:'#0e7490', color:'#fff', borderRadius:0}}>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="0"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                            לתשלום עבור שריון המקום
                          </a>
                        ) : (
                          <p className="text-center text-sm font-semibold py-2" style={{color:'#92400e'}}>
                            אנא צור קשר עם המנהלות להסדרת התשלום
                          </p>
                        )}
                      </div>
                    </div>
                  )}
                  {/* Add to calendar */}
                  <a href={gcal} target="_blank" rel="noopener noreferrer"
                    className="flex items-center justify-center gap-2 py-2.5 mb-3 rounded-lg font-semibold transition"
                    style={{textDecoration:'none', background:'#152020', color:'#A0CCC1'}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    הוספה ליומן
                  </a>
                </>
              );
            })() : (
              <form onSubmit={handleRegister} className="space-y-3">
                <input type="text" placeholder="שמך המלא *" value={name} onChange={e => setName(e.target.value)}
                  className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" dir="rtl" />
                <input type="tel" placeholder="טלפון *" value={phone} onChange={e => setPhone(e.target.value)}
                  className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" dir="ltr" style={{textAlign:'right'}} />
                <input type="email" placeholder="אימייל *" value={email} onChange={e => setEmail(e.target.value)}
                  className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" dir="ltr" style={{textAlign:'right'}} />
                <textarea placeholder="הערות (אופציונלי)" value={notes} onChange={e => setNotes(e.target.value)}
                  rows={2} dir="rtl"
                  className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary resize-none" />
                <button type="submit" disabled={loading}
                  className="w-full py-2.5 bg-primary text-white rounded-lg font-semibold hover:bg-blue-600 transition disabled:opacity-50 flex items-center justify-center gap-2">
                  {loading && <div className="spinner" style={{width:16,height:16,borderWidth:2}}></div>}
                  הרשמה
                </button>
              </form>
            )}
          </>
        ) : isFull ? (
          <div className="text-center py-4 text-gray-400">ההרשמה סגורה — האירוע מלא.</div>
        ) : null}
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────
function App() {
  const [month, setMonth] = useState(new Date().getMonth());
  const [year, setYear] = useState(new Date().getFullYear());
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [selectedDay, setSelectedDay] = useState(null); // { day, events }

  const fetchEvents = useCallback(async () => {
    setLoading(true);
    try {
      const data = await apiFetch(`/events/public?month=${month + 1}&year=${year}`);
      setEvents(data);
    } catch (err) { console.error(err); }
    setLoading(false);
  }, [month, year]);

  useEffect(() => { fetchEvents(); }, [fetchEvents]);

  function handlePrev() {
    if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1);
  }
  function handleNext() {
    if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1);
  }

  function handleEventClick(event) {
    setSelectedEvent(event);
  }

  function handleRegistered() {
    fetchEvents();
    // Update the selected event with fresh data
    if (selectedEvent) {
      const updated = events.find(e => e.id === selectedEvent.id);
      // Will be updated on next render from fetchEvents
    }
  }

  return (
    <div className="min-h-screen bg-bgLight">
      <header className="bg-white shadow-sm border-b border-gray-100">
        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
          <a href="/" style={{textDecoration:'none'}}>
            <div style={{width:'48px',height:'48px',borderRadius:'50%',overflow:'hidden',flexShrink:0}}>
              <img src="/images/logo.png" alt="עופרים" style={{width:'100%',height:'100%',objectFit:'cover',transform:'scale(1.38)',display:'block'}} />
            </div>
          </a>
          <div className="flex items-center gap-4">
            {getUserToken() ? (
              <>
                {getUserData()?.name && (
                  <span className="text-sm text-gray-500 font-medium">שלום, {getUserData().name}</span>
                )}
                <a href="/dashboard" className="text-sm text-gray-400 hover:text-primary transition" style={{textDecoration:'none'}}>האזור שלי</a>
                <button onClick={logout} className="text-sm text-gray-400 hover:text-red-500 transition">התנתקות</button>
              </>
            ) : (
              <a href="/login" className="text-sm text-gray-400 hover:text-primary transition" style={{textDecoration:'none'}}>כניסה / הרשמה</a>
            )}
            <a href="/" className="text-sm text-gray-400 hover:text-primary transition" style={{textDecoration:'none'}}>דף הבית</a>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6">
        <h1 className="text-2xl font-bold text-textDark mb-6">לוח אירועים</h1>
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
          <MonthNavigator month={month} year={year} onPrev={handlePrev} onNext={handleNext} />
          {loading ? (
            <div className="flex justify-center py-20"><div className="spinner"></div></div>
          ) : (
            <DayGrid month={month} year={year} events={events} onEventClick={handleEventClick}
            onDayClick={(day, dayEvents) => setSelectedDay({ day, events: dayEvents })} />
          )}
        </div>

        {/* Upcoming Events List */}
        <div className="mt-6 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
          <h3 className="text-lg font-bold mb-4">אירועים קרובים</h3>
          {events.length === 0 ? (
            <p className="text-gray-400 text-sm">אין אירועים החודש.</p>
          ) : (
            <div className="space-y-2">
              {events.sort((a,b) => a.date.localeCompare(b.date)).map(ev => (
                <div key={ev.id} onClick={() => handleEventClick(ev)}
                  className="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 cursor-pointer transition">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ backgroundColor: ev.color }}></div>
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate">{ev.title}</div>
                    <div className="text-xs text-gray-400">
                      {formatHeDate(ev.date)} {ev.time && `· ${ev.time}`}
                      {ev.location && ` · ${ev.location}`}
                    </div>
                  </div>
                  <div className="flex flex-col items-end gap-1 flex-shrink-0">
                    <div className="flex items-center gap-1">
                      <PriceBadge price={ev.price} />
                      {ev.allow_couples && ev.couple_price > 0 && (
                        <span className="inline-block text-xs font-bold px-2 py-0.5 bg-gray-700 text-white">
                          זוגי {fmtPrice(ev.couple_price)}
                        </span>
                      )}
                    </div>
                    <div className={`text-xs font-semibold ${ev.spots_left !== null && ev.spots_left <= 0 ? 'text-red-500' : 'text-green-600'}`}>
                      {ev.spots_left !== null && ev.spots_left <= 0 ? 'הרשמה מלאה' : 'יש מקום פנוי'}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </main>

      <footer className="text-center py-6 text-xs text-gray-400">
        עופרים &copy; {new Date().getFullYear()}
        <span className="mx-2">·</span>
        <a href="/" className="hover:text-primary transition">דף הבית</a>
        <div style={{fontSize:'10px',marginTop:'4px',color:'#c0af90'}}>נבנה על ידי High Standard Solution</div>
      </footer>

      {selectedDay && (
        <DayPopup day={selectedDay.day} month={month} year={year} events={selectedDay.events}
          onEventClick={handleEventClick}
          onClose={() => setSelectedDay(null)} />
      )}
      {selectedEvent && (
        <EventModal event={selectedEvent}
          onClose={() => setSelectedEvent(null)}
          onRegistered={handleRegistered} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'SW_UPDATED') document.getElementById('swBanner').style.display = 'flex';
    });
  }
</script>
<script src="/staging-banner.js"></script>
<script src="/analytics.js"></script>
</body>
</html>
