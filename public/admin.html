<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5a4a32">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/images/logo.png">
<title>עופרים — ניהול</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { sans: ['Noto Sans Hebrew', 'sans-serif'] },
    colors: { primary: '#3498db', secondary: '#f1c40f', bgLight: '#f9f9f9', textDark: '#333' }
  }}
}
</script>
<style>
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-bgLight font-sans text-textDark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

let authToken = sessionStorage.getItem('ofarim_admin_token');

async function apiFetch(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch('/api' + url, { ...options, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Login ───────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  // Shown only on non-production hosts (staging preview). Hidden on the live site.
  const isStagingHost = location.hostname !== 'ofarim.pages.dev' && location.hostname !== 'www.ofarim.pages.dev';

  async function handleSubmit(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      authToken = data.token;
      sessionStorage.setItem('ofarim_admin_token', data.token);
      onLogin(data.user);
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  // Staging fast-track: skip the password and enter via the staging backdoor.
  // Only reachable on staging (the /api/staging/* routes 404 in production).
  async function handleStagingLogin() {
    setError(''); setLoading(true);
    try {
      const res = await fetch('/api/staging/admin-login', {
        method: 'POST',
        headers: { 'X-Staging-Token': 'staging-admin-sandbox-token-v3p8' },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Staging admin login failed');
      authToken = data.token;
      sessionStorage.setItem('ofarim_admin_token', data.token);
      onLogin(data.admin);
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary/10 to-secondary/10">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md fade-in">
        <div className="flex justify-center mb-2"><img src="/images/logo.png" alt="עופרים" style={{height:'80px',width:'auto'}} /></div>
        <p className="text-center text-gray-500 mb-6">פאנל ניהול</p>
        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{error}</div>}
        <form onSubmit={handleSubmit} className="space-y-4">
          <input type="email" placeholder="אימייל" value={email} onChange={e => setEmail(e.target.value)} dir="ltr"
            className="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
          <input type="password" placeholder="סיסמה" value={password} onChange={e => setPassword(e.target.value)} dir="ltr"
            className="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
          <button type="submit" disabled={loading}
            className="w-full py-3 bg-primary text-white rounded-lg font-semibold hover:bg-blue-600 transition disabled:opacity-50 flex items-center justify-center gap-2">
            {loading && <div className="spinner" style={{width:18,height:18,borderWidth:2}}></div>}
            כניסה
          </button>
        </form>
        {isStagingHost && (
          <button type="button" onClick={handleStagingLogin} disabled={loading}
            className="w-full mt-3 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition disabled:opacity-50">
            ⚡ כניסת אדמין מהירה (STAGING)
          </button>
        )}
      </div>
    </div>
  );
}

// ─── Event Form Modal ────────────────────────────────────
function EventForm({ event, onSave, onDelete, onClose }) {
  const [title, setTitle] = useState(event?.title || '');
  const [date, setDate] = useState(event?.date || '');
  const [time, setTime] = useState(event?.time || '');
  const [endTime, setEndTime] = useState(event?.end_time || '');
  const [description, setDescription] = useState(event?.description || '');
  const [location, setLocation] = useState(event?.location || '');
  const [color, setColor] = useState(event?.color || '#3498db');
  const [maxParticipants, setMaxParticipants] = useState(event?.max_participants || 0);
  // price is stored in agorot on the server; the form works in whole ILS.
  const [price, setPrice] = useState(event?.price ? event.price / 100 : '');
  const [allowCouples, setAllowCouples] = useState(event?.allow_couples ? true : false);
  const [couplePrice, setCouplePrice] = useState(event?.couple_price ? event.couple_price / 100 : '');
  const [paymentLink, setPaymentLink] = useState(event?.payment_link || '');
  const [confirmationMessage, setConfirmationMessage] = useState(event?.confirmation_message || '');
  const [reminderMessage, setReminderMessage] = useState(event?.reminder_message || '');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const colors = ['#3498db','#e74c3c','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#34495e'];

  async function handleSubmit(e) {
    e.preventDefault();
    setError('');
    if (!title.trim()) return setError('שם האירוע הוא שדה חובה');
    if (!date) return setError('תאריך הוא שדה חובה');
    setLoading(true);
    try {
      // Send price in ILS; the API converts to agorot on insert.
      const body = { title, date, time, end_time: endTime, description, location, color, max_participants: parseInt(maxParticipants) || 0, price: parseFloat(price) || 0, allow_couples: allowCouples, couple_price: allowCouples ? (parseFloat(couplePrice) || 0) : 0, payment_link: paymentLink.trim() || null, confirmation_message: confirmationMessage.trim() || null, reminder_message: reminderMessage.trim() || null };
      if (event) {
        await apiFetch(`/events/${event.id}`, { method: 'PUT', body: JSON.stringify(body) });
      } else {
        await apiFetch('/events', { method: 'POST', body: JSON.stringify(body) });
      }
      onSave();
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  async function handleDelete() {
    if (!confirm('למחוק את האירוע וכל ההרשמות?')) return;
    setLoading(true);
    try {
      await apiFetch(`/events/${event.id}`, { method: 'DELETE' });
      onDelete();
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 fade-in max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-bold">{event ? 'עריכת אירוע' : 'אירוע חדש'}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>
        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{error}</div>}
        <form onSubmit={handleSubmit} className="space-y-3">
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">שם האירוע *</label>
            <input type="text" value={title} onChange={e => setTitle(e.target.value)} maxLength={255}
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" autoFocus />
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">תאריך *</label>
              <input type="date" value={date} onChange={e => setDate(e.target.value)}
                className="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">שעת התחלה</label>
              <input type="time" value={time} onChange={e => setTime(e.target.value)}
                className="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">שעת סיום</label>
              <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
                className="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">מיקום</label>
            <input type="text" value={location} onChange={e => setLocation(e.target.value)}
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" placeholder="לדוגמה: אולם ראשי" />
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">תיאור</label>
            <textarea value={description} onChange={e => setDescription(e.target.value)} maxLength={1000} rows={3}
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary resize-none" />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">מקסימום משתתפים (0 = ללא הגבלה)</label>
              <input type="number" value={maxParticipants} onChange={e => setMaxParticipants(e.target.value)} min="0"
                className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">מחיר ₪ (0 = חינם)</label>
              <input type="number" value={price} onChange={e => setPrice(e.target.value)} min="0" step="0.01" placeholder="0"
                className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
          </div>
          {/* ── Couple Registration ── */}
          <div className="border border-gray-200 rounded-lg p-3 space-y-2">
            <label className="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" checked={allowCouples} onChange={e => setAllowCouples(e.target.checked)}
                className="w-4 h-4 accent-primary" />
              <span className="text-sm font-semibold text-gray-700">אפשר הרשמה זוגית</span>
            </label>
            {allowCouples && (
              <div>
                <label className="block text-xs font-semibold text-gray-500 mb-1">מחיר לזוג ₪</label>
                <input type="number" value={couplePrice} onChange={e => setCouplePrice(e.target.value)} min="0" step="0.01" placeholder="0"
                  className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
              </div>
            )}
          </div>
          {/* ── Payment Link ── */}
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">קישור לתשלום (PayBox / Bit)</label>
            <input type="url" value={paymentLink} onChange={e => setPaymentLink(e.target.value)}
              placeholder="https://payboxapp.page.link/..."
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" dir="ltr" />
            <p className="text-xs text-gray-400 mt-1">השאר ריק לאירוע חינמי או אם התשלום מסודר בנפרד</p>
          </div>
          {/* ── Email Messages ── */}
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">תוכן מייל אישור הרשמה</label>
            <textarea value={confirmationMessage} onChange={e => setConfirmationMessage(e.target.value)} rows={4} dir="rtl"
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary resize-none"
              placeholder="טקסט שיישלח למשתתפים לאחר אישור ההרשמה..." />
            <p className="text-xs text-gray-400 mt-1">השאר ריק כדי לא לשלוח מייל אישור</p>
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">תוכן מייל תזכורת (24 שעות לפני)</label>
            <textarea value={reminderMessage} onChange={e => setReminderMessage(e.target.value)} rows={4} dir="rtl"
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary resize-none"
              placeholder="טקסט שיישלח למשתתפים יום לפני האירוע..." />
            <p className="text-xs text-gray-400 mt-1">השאר ריק כדי לא לשלוח מייל תזכורת</p>
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">צבע</label>
            <div className="flex gap-2">
              {colors.map(c => (
                <button key={c} type="button" onClick={() => setColor(c)}
                  className={`w-8 h-8 rounded-full transition ${color === c ? 'ring-2 ring-offset-2 ring-gray-400 scale-110' : 'hover:scale-110'}`}
                  style={{ backgroundColor: c }} />
              ))}
            </div>
          </div>
          <div className="flex gap-3 pt-2">
            <button type="submit" disabled={loading}
              className="flex-1 py-2.5 bg-primary text-white rounded-lg font-semibold hover:bg-blue-600 transition disabled:opacity-50 flex items-center justify-center gap-2">
              {loading && <div className="spinner" style={{width:16,height:16,borderWidth:2}}></div>}
              {event ? 'עדכון' : 'יצירה'}
            </button>
            {event && (
              <button type="button" onClick={handleDelete} disabled={loading}
                className="px-4 py-2.5 bg-red-500 text-white rounded-lg font-semibold hover:bg-red-600 transition disabled:opacity-50">
                מחיקה
              </button>
            )}
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── Participants Modal ──────────────────────────────────
const STATUS_META = {
  confirmed:  { label: 'מאושר',           badge: 'bg-emerald-100 text-emerald-700', dot: 'bg-emerald-500' },
  pending:    { label: 'ממתין לתשלום',    badge: 'bg-amber-100 text-amber-700',     dot: 'bg-amber-500' },
  waitlisted: { label: 'רשימת המתנה',     badge: 'bg-slate-100 text-slate-600',     dot: 'bg-slate-400' },
};

function StatusBadge({ status }) {
  const m = STATUS_META[status] || STATUS_META.waitlisted;
  return <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${m.badge}`}>{m.label}</span>;
}

function ParticipantsModal({ event, onClose, onChanged }) {
  // Local copy so we can update a row to 'confirmed' without a full reload.
  const [participants, setParticipants] = useState(event.participants || []);
  const [busyId, setBusyId] = useState(null);

  const held = participants.filter(p => p.status === 'confirmed' || p.status === 'pending').length;

  async function handleRemove(pid) {
    if (!confirm('להסיר משתתף זה?')) return;
    setBusyId(pid);
    try {
      await apiFetch(`/events/${event.id}/participants/${pid}`, { method: 'DELETE' });
      setParticipants(prev => prev.filter(p => p.id !== pid));
      onChanged && onChanged();               // refresh dashboard counts in the background
    } catch (err) { alert(err.message); }
    setBusyId(null);
  }

  async function handleConfirm(pid) {
    setBusyId(pid);
    try {
      await apiFetch(`/events/${event.id}/confirm-payment`, {
        method: 'POST', body: JSON.stringify({ participant_id: pid }),
      });
      setParticipants(prev => prev.map(p => p.id === pid ? { ...p, status: 'confirmed' } : p));
      onChanged && onChanged();               // refresh dashboard counts in the background
    } catch (err) { alert(err.message); }     // e.g. "Hold expired or invalid"
    setBusyId(null);
  }

  function Row({ p }) {
    return (
      <div className="flex items-center gap-3 py-3">
        <div className="flex-1 min-w-0">
          <div className="font-semibold text-sm flex items-center gap-2 flex-wrap">
            {p.name} <StatusBadge status={p.status} />
          </div>
          <div className="text-xs text-gray-400">
            {p.phone && `📱 ${p.phone}`}
            {p.phone && p.email && ' · '}
            {p.email && `✉️ ${p.email}`}
            {!p.phone && !p.email && `נרשם: ${p.created_at || p.signed_at}`}
          </div>
        </div>
        {p.status === 'pending' && (
          <button onClick={() => handleConfirm(p.id)} disabled={busyId === p.id}
            className="text-xs bg-emerald-500 text-white px-3 py-1.5 rounded-lg font-semibold hover:bg-emerald-600 transition disabled:opacity-50 flex-shrink-0">
            {busyId === p.id ? '…' : '✓ אשר תשלום'}
          </button>
        )}
        <button onClick={() => handleRemove(p.id)} disabled={busyId === p.id}
          className="text-xs text-red-400 hover:text-red-600 transition px-2 py-1 flex-shrink-0">
          הסר
        </button>
      </div>
    );
  }

  function Section({ status }) {
    const rows = participants.filter(p => p.status === status);
    if (rows.length === 0) return null;
    const m = STATUS_META[status];
    return (
      <div className="mb-2">
        <div className="flex items-center gap-2 pt-3 pb-1">
          <span className={`w-2 h-2 rounded-full ${m.dot}`}></span>
          <span className="text-xs font-bold uppercase tracking-wide text-gray-500">{m.label}</span>
          <span className="text-xs text-gray-400">({rows.length})</span>
        </div>
        <div className="divide-y divide-gray-100">
          {rows.map(p => <Row key={p.id} p={p} />)}
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 fade-in max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-2">
          <div>
            <h3 className="text-lg font-bold">{event.title}</h3>
            <p className="text-sm text-gray-500">{held} רשומים{event.max_participants > 0 ? ` / ${event.max_participants} מקסימום` : ''}</p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>

        {participants.length === 0 ? (
          <p className="text-gray-400 text-sm text-center py-8">אין משתתפים עדיין.</p>
        ) : (
          <div>
            <Section status="confirmed" />
            <Section status="pending" />
            <Section status="waitlisted" />
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Traffic Dashboard ────────────────────────────────────────
const PAGE_LABELS = {
  home: 'דף הבית', calendar: 'לוח אירועים', login: 'כניסה',
  dashboard: 'האזור האישי', terms: 'תקנון', cancellation: 'ביטולים', privacy: 'פרטיות',
};

function StatCard({ label, sessions, views }) {
  return (
    <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
      <div className="text-xs text-gray-400 mb-1">{label}</div>
      <div className="text-2xl font-bold text-gray-800">{sessions ?? 0}</div>
      <div className="text-xs text-gray-400">מבקרים</div>
      <div className="text-sm text-gray-500 mt-1">{views ?? 0} צפיות</div>
    </div>
  );
}

function TrafficDashboard() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);

  useEffect(() => {
    setLoading(true);
    setErr(null);
    apiFetch('/analytics/summary')
      .then(setData)
      .catch(e => setErr(e.message))
      .finally(() => setLoading(false));
  }, []);

  if (loading) return <div className="flex justify-center py-20"><div className="spinner"></div></div>;
  if (err)     return <div className="text-center py-20 text-red-400 text-sm">{err}</div>;
  if (!data)   return null;

  const hourly = data.hourly_today ?? [];
  const topPages = data.top_pages ?? [];
  const topCountries = data.top_countries ?? [];
  const maxHourly = Math.max(...hourly.map(h => h.sessions), 1);

  return (
    <div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <StatCard label="היום"           sessions={data.today?.sessions}    views={data.today?.views} />
        <StatCard label="שבוע אחרון"     sessions={data.week?.sessions}     views={data.week?.views} />
        <StatCard label="30 יום אחרונים" sessions={data.month?.sessions}    views={data.month?.views} />
        <StatCard label={'סה"כ'}         sessions={data.all_time?.sessions} views={data.all_time?.views} />
      </div>

      {hourly.length > 0 && (
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5 mb-6">
          <h3 className="text-sm font-bold text-gray-700 mb-4">מבקרים לפי שעה — היום</h3>
          <div className="flex items-end gap-0.5 h-20">
            {Array.from({ length: 24 }, (_, i) => {
              const h = String(i).padStart(2, '0');
              const d = hourly.find(x => x.hour === h);
              const pct = d ? (d.sessions / maxHourly) * 100 : 0;
              return (
                <div key={h} className="flex-1 flex flex-col items-center gap-1" title={`${h}:00 — ${d ? d.sessions : 0} מבקרים`}>
                  <div className="w-full rounded-sm" style={{ height: `${Math.max(pct, pct > 0 ? 4 : 0)}%`, backgroundColor: '#4E7772', minHeight: pct > 0 ? '2px' : '0' }}></div>
                  {i % 6 === 0 && <span className="text-gray-300" style={{fontSize:'9px'}}>{h}</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="grid md:grid-cols-2 gap-6">
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
          <h3 className="text-sm font-bold text-gray-700 mb-4">עמודים פופולריים (30 יום)</h3>
          {topPages.length === 0
            ? <p className="text-sm text-gray-400">אין נתונים עדיין</p>
            : <div className="space-y-1">
                {topPages.map(p => (
                  <div key={p.page} className="flex justify-between items-center py-1.5 border-b border-gray-50 last:border-0">
                    <span className="text-sm text-gray-700">{PAGE_LABELS[p.page] || p.page}</span>
                    <div className="flex gap-3 text-xs text-gray-400">
                      <span className="font-semibold text-gray-600">{p.sessions} מבקרים</span>
                      <span>|</span>
                      <span>{p.views} צפיות</span>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>

        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
          <h3 className="text-sm font-bold text-gray-700 mb-4">מדינות (30 יום)</h3>
          {topCountries.length === 0
            ? <p className="text-sm text-gray-400">אין נתונים עדיין</p>
            : <div className="space-y-1">
                {topCountries.map(row => (
                  <div key={row.country} className="flex justify-between items-center py-1.5 border-b border-gray-50 last:border-0">
                    <span className="text-sm text-gray-700">{row.country}</span>
                    <span className="text-xs font-semibold text-gray-600">{row.sessions} מבקרים</span>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>
    </div>
  );
}

// ─── Admin App ───────────────────────────────────────────
function AdminApp() {
  const [admin, setAdmin] = useState(null);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [editEvent, setEditEvent] = useState(null);
  const [viewParticipants, setViewParticipants] = useState(null);
  const [activeTab, setActiveTab] = useState('events');

  useEffect(() => {
    if (authToken) {
      apiFetch('/auth/me').then(setAdmin).catch(() => {
        authToken = null;
        sessionStorage.removeItem('ofarim_admin_token');
      });
    }
  }, []);

  const fetchEvents = useCallback(async () => {
    if (!admin) return;
    setLoading(true);
    try { setEvents(await apiFetch('/events')); } catch (e) { console.error(e); }
    setLoading(false);
  }, [admin]);

  useEffect(() => { fetchEvents(); }, [fetchEvents]);

  function handleLogout() {
    authToken = null;
    sessionStorage.removeItem('ofarim_admin_token');
    setAdmin(null);
  }

  function handleFormClose() { setShowForm(false); setEditEvent(null); }
  function handleSave() { handleFormClose(); fetchEvents(); }

  if (!admin) return <LoginScreen onLogin={setAdmin} />;

  // Group events by date
  const upcoming = [...events].sort((a, b) => a.date.localeCompare(b.date));

  return (
    <div className="min-h-screen bg-bgLight">
      <header className="bg-white shadow-sm border-b border-gray-100">
        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
          <div className="flex items-center gap-3">
            <img src="/images/logo.png" alt="עופרים" style={{height:'40px',width:'auto'}} />
            <span className="text-xs bg-primary/10 text-primary px-2 py-1 rounded-full font-semibold">מנהל</span>
          </div>
          <div className="flex items-center gap-4">
            <a href="/admin-dashboard" className="text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 transition">לוח בקרה</a>
            <a href="/" className="text-sm text-gray-400 hover:text-primary transition">דף הבית</a>
            <a href="/calendar" className="text-sm text-gray-400 hover:text-primary transition">לוח אירועים</a>
            <span className="text-sm text-gray-500">שלום, {admin.name}</span>
            <button onClick={handleLogout} className="text-sm text-gray-400 hover:text-red-500 transition">התנתקות</button>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6">
        {/* Tab bar */}
        <div className="flex gap-6 mb-6 border-b border-gray-100">
          <button onClick={() => setActiveTab('events')}
            className={`pb-2 text-sm font-semibold border-b-2 transition ${activeTab === 'events' ? 'border-primary text-primary' : 'border-transparent text-gray-400 hover:text-gray-600'}`}>
            אירועים ({events.length})
          </button>
          <button onClick={() => setActiveTab('traffic')}
            className={`pb-2 text-sm font-semibold border-b-2 transition ${activeTab === 'traffic' ? 'border-primary text-primary' : 'border-transparent text-gray-400 hover:text-gray-600'}`}>
            תנועה
          </button>
        </div>

        {activeTab === 'traffic' ? (
          <TrafficDashboard />
        ) : (
          <>
            {/* Action bar */}
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-lg font-bold">כל האירועים ({events.length})</h2>
              <button onClick={() => { setEditEvent(null); setShowForm(true); }}
                className="px-5 py-2.5 bg-primary text-white rounded-lg font-semibold hover:bg-blue-600 transition">
                + אירוע חדש
              </button>
            </div>

            {loading ? (
              <div className="flex justify-center py-20"><div className="spinner"></div></div>
            ) : events.length === 0 ? (
              <div className="text-center py-20 text-gray-400">
                <p className="text-lg mb-2">אין אירועים עדיין</p>
                <p className="text-sm">לחץ על "+ אירוע חדש" ליצירת האירוע הראשון.</p>
              </div>
            ) : (
              <div className="space-y-3">
                {upcoming.map(ev => (
                  <div key={ev.id} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-4 hover:shadow-md transition">
                    <div className="w-2 h-14 rounded-full flex-shrink-0" style={{ backgroundColor: ev.color }}></div>
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-base">{ev.title}</div>
                      <div className="text-sm text-gray-500 flex flex-wrap gap-2 mt-1">
                        <span>📅 {ev.date}</span>
                        {ev.time && <span>🕐 {ev.time}{ev.end_time ? `-${ev.end_time}` : ''}</span>}
                        {ev.location && <span>📍 {ev.location}</span>}
                        {ev.price > 0
                          ? <span className="text-gray-600 font-semibold">💰 ₪{ev.price / 100}</span>
                          : <span className="text-emerald-600 font-semibold">חינם</span>}
                      </div>
                    </div>
                    <div className="flex-shrink-0 flex items-center gap-1.5 px-2">
                      <span title="מאושר" className="text-xs font-bold px-2 py-1 rounded-full bg-emerald-100 text-emerald-700">✓ {ev.confirmed_count || 0}</span>
                      <span title="ממתין לתשלום" className="text-xs font-bold px-2 py-1 rounded-full bg-amber-100 text-amber-700">⏳ {ev.pending_count || 0}</span>
                      <span title="רשימת המתנה" className="text-xs font-bold px-2 py-1 rounded-full bg-slate-100 text-slate-600">⌛ {ev.waitlist_count || 0}</span>
                      {ev.max_participants > 0 && (
                        <span className="text-xs text-gray-400 ml-1">/ {ev.max_participants}</span>
                      )}
                    </div>
                    <div className="flex gap-2 flex-shrink-0">
                      <button onClick={() => setViewParticipants(ev)}
                        className="px-3 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition font-semibold">
                        👥 משתתפים
                      </button>
                      <button onClick={() => { setEditEvent(ev); setShowForm(true); }}
                        className="px-3 py-2 text-sm bg-primary/10 text-primary hover:bg-primary/20 rounded-lg transition font-semibold">
                        ✏️ עריכה
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        )}
      </main>

      {showForm && (
        <EventForm event={editEvent} onSave={handleSave} onDelete={handleSave} onClose={handleFormClose} />
      )}

      {viewParticipants && (
        <ParticipantsModal event={viewParticipants}
          onClose={() => setViewParticipants(null)}
          onChanged={fetchEvents} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});</script>
<script src="/staging-banner.js"></script>
</body>
</html>
