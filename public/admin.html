<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofarim — Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: { extend: {
    fontFamily: { sans: ['Open Sans', 'sans-serif'] },
    colors: { primary: '#3498db', secondary: '#f1c40f', bgLight: '#f9f9f9', textDark: '#333' }
  }}
}
</script>
<style>
  .fade-in { animation: fadeIn 0.2s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3498db; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-bgLight font-sans text-textDark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

let authToken = sessionStorage.getItem('ofarim_admin_token');

async function apiFetch(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch('/api' + url, { ...options, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Login ───────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      authToken = data.token;
      sessionStorage.setItem('ofarim_admin_token', data.token);
      onLogin(data.user);
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary/10 to-secondary/10">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md fade-in">
        <h1 className="text-3xl font-bold text-center text-primary mb-1">Ofarim</h1>
        <p className="text-center text-gray-500 mb-6">Admin Panel</p>
        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{error}</div>}
        <form onSubmit={handleSubmit} className="space-y-4">
          <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)}
            className="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
          <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)}
            className="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
          <button type="submit" disabled={loading}
            className="w-full py-3 bg-primary text-white rounded-lg font-semibold hover:bg-blue-600 transition disabled:opacity-50 flex items-center justify-center gap-2">
            {loading && <div className="spinner" style={{width:18,height:18,borderWidth:2}}></div>}
            Login
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── Event Form Modal ────────────────────────────────────
function EventForm({ event, onSave, onDelete, onClose }) {
  const [title, setTitle] = useState(event?.title || '');
  const [date, setDate] = useState(event?.date || '');
  const [time, setTime] = useState(event?.time || '');
  const [endTime, setEndTime] = useState(event?.end_time || '');
  const [description, setDescription] = useState(event?.description || '');
  const [location, setLocation] = useState(event?.location || '');
  const [color, setColor] = useState(event?.color || '#3498db');
  const [maxParticipants, setMaxParticipants] = useState(event?.max_participants || 0);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const colors = ['#3498db','#e74c3c','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#34495e'];

  async function handleSubmit(e) {
    e.preventDefault();
    setError('');
    if (!title.trim()) return setError('Title is required');
    if (!date) return setError('Date is required');
    setLoading(true);
    try {
      const body = { title, date, time, end_time: endTime, description, location, color, max_participants: parseInt(maxParticipants) || 0 };
      if (event) {
        await apiFetch(`/events/${event.id}`, { method: 'PUT', body: JSON.stringify(body) });
      } else {
        await apiFetch('/events', { method: 'POST', body: JSON.stringify(body) });
      }
      onSave();
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  async function handleDelete() {
    if (!confirm('Delete this event and all registrations?')) return;
    setLoading(true);
    try {
      await apiFetch(`/events/${event.id}`, { method: 'DELETE' });
      onDelete();
    } catch (err) { setError(err.message); }
    setLoading(false);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 fade-in max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-bold">{event ? 'Edit Event' : 'New Event'}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>
        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{error}</div>}
        <form onSubmit={handleSubmit} className="space-y-3">
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">Title *</label>
            <input type="text" value={title} onChange={e => setTitle(e.target.value)} maxLength={255}
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" autoFocus />
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">Date *</label>
              <input type="date" value={date} onChange={e => setDate(e.target.value)}
                className="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">Start</label>
              <input type="time" value={time} onChange={e => setTime(e.target.value)}
                className="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-600 mb-1">End</label>
              <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)}
                className="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
            </div>
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">Location</label>
            <input type="text" value={location} onChange={e => setLocation(e.target.value)}
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" placeholder="e.g. Main Hall" />
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">Description</label>
            <textarea value={description} onChange={e => setDescription(e.target.value)} maxLength={1000} rows={3}
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary resize-none" />
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">Max Participants (0 = unlimited)</label>
            <input type="number" value={maxParticipants} onChange={e => setMaxParticipants(e.target.value)} min="0"
              className="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-primary" />
          </div>
          <div>
            <label className="block text-sm font-semibold text-gray-600 mb-1">Color</label>
            <div className="flex gap-2">
              {colors.map(c => (
                <button key={c} type="button" onClick={() => setColor(c)}
                  className={`w-8 h-8 rounded-full transition ${color === c ? 'ring-2 ring-offset-2 ring-gray-400 scale-110' : 'hover:scale-110'}`}
                  style={{ backgroundColor: c }} />
              ))}
            </div>
          </div>
          <div className="flex gap-3 pt-2">
            <button type="submit" disabled={loading}
              className="flex-1 py-2.5 bg-primary text-white rounded-lg font-semibold hover:bg-blue-600 transition disabled:opacity-50 flex items-center justify-center gap-2">
              {loading && <div className="spinner" style={{width:16,height:16,borderWidth:2}}></div>}
              {event ? 'Update' : 'Create'}
            </button>
            {event && (
              <button type="button" onClick={handleDelete} disabled={loading}
                className="px-4 py-2.5 bg-red-500 text-white rounded-lg font-semibold hover:bg-red-600 transition disabled:opacity-50">
                Delete
              </button>
            )}
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── Participants Modal ──────────────────────────────────
function ParticipantsModal({ event, onClose, onRemove }) {
  const [loading, setLoading] = useState(false);

  async function handleRemove(pid) {
    if (!confirm('Remove this participant?')) return;
    setLoading(true);
    try {
      await apiFetch(`/events/${event.id}/participants/${pid}`, { method: 'DELETE' });
      onRemove();
    } catch (err) { alert(err.message); }
    setLoading(false);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 fade-in max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4">
          <div>
            <h3 className="text-lg font-bold">{event.title}</h3>
            <p className="text-sm text-gray-500">{event.participant_count} participant{event.participant_count !== 1 ? 's' : ''}
              {event.max_participants > 0 ? ` / ${event.max_participants} max` : ''}</p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>

        {event.participants.length === 0 ? (
          <p className="text-gray-400 text-sm text-center py-8">No participants yet.</p>
        ) : (
          <div className="divide-y divide-gray-100">
            {event.participants.map((p, i) => (
              <div key={p.id} className="flex items-center gap-3 py-3">
                <div className="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-sm font-bold">
                  {i + 1}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm">{p.name}</div>
                  <div className="text-xs text-gray-400">
                    {p.phone && `📱 ${p.phone}`}
                    {p.phone && p.email && ' · '}
                    {p.email && `✉️ ${p.email}`}
                    {!p.phone && !p.email && `Signed ${p.signed_at}`}
                  </div>
                </div>
                <button onClick={() => handleRemove(p.id)} disabled={loading}
                  className="text-xs text-red-400 hover:text-red-600 transition px-2 py-1">
                  Remove
                </button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Admin App ───────────────────────────────────────────
function AdminApp() {
  const [admin, setAdmin] = useState(null);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [editEvent, setEditEvent] = useState(null);
  const [viewParticipants, setViewParticipants] = useState(null);

  useEffect(() => {
    if (authToken) {
      apiFetch('/auth/me').then(setAdmin).catch(() => {
        authToken = null;
        sessionStorage.removeItem('ofarim_admin_token');
      });
    }
  }, []);

  const fetchEvents = useCallback(async () => {
    if (!admin) return;
    setLoading(true);
    try { setEvents(await apiFetch('/events')); } catch (e) { console.error(e); }
    setLoading(false);
  }, [admin]);

  useEffect(() => { fetchEvents(); }, [fetchEvents]);

  function handleLogout() {
    authToken = null;
    sessionStorage.removeItem('ofarim_admin_token');
    setAdmin(null);
  }

  function handleFormClose() { setShowForm(false); setEditEvent(null); }
  function handleSave() { handleFormClose(); fetchEvents(); }

  if (!admin) return <LoginScreen onLogin={setAdmin} />;

  // Group events by date
  const upcoming = [...events].sort((a, b) => a.date.localeCompare(b.date));

  return (
    <div className="min-h-screen bg-bgLight">
      <header className="bg-white shadow-sm border-b border-gray-100">
        <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
          <div className="flex items-center gap-3">
            <h1 className="text-2xl font-bold text-primary">Ofarim</h1>
            <span className="text-xs bg-primary/10 text-primary px-2 py-1 rounded-full font-semibold">ADMIN</span>
          </div>
          <div className="flex items-center gap-4">
            <a href="/" className="text-sm text-gray-400 hover:text-primary transition">דף הבית</a>
            <a href="/calendar" className="text-sm text-gray-400 hover:text-primary transition">לוח אירועים</a>
            <span className="text-sm text-gray-500">Hi, {admin.name}</span>
            <button onClick={handleLogout} className="text-sm text-gray-400 hover:text-red-500 transition">Logout</button>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-6">
        {/* Action bar */}
        <div className="flex justify-between items-center mb-6">
          <h2 className="text-lg font-bold">All Events ({events.length})</h2>
          <button onClick={() => { setEditEvent(null); setShowForm(true); }}
            className="px-5 py-2.5 bg-primary text-white rounded-lg font-semibold hover:bg-blue-600 transition">
            + New Event
          </button>
        </div>

        {loading ? (
          <div className="flex justify-center py-20"><div className="spinner"></div></div>
        ) : events.length === 0 ? (
          <div className="text-center py-20 text-gray-400">
            <p className="text-lg mb-2">No events yet</p>
            <p className="text-sm">Click "+ New Event" to create one.</p>
          </div>
        ) : (
          <div className="space-y-3">
            {upcoming.map(ev => (
              <div key={ev.id} className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-4 hover:shadow-md transition">
                <div className="w-2 h-14 rounded-full flex-shrink-0" style={{ backgroundColor: ev.color }}></div>
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-base">{ev.title}</div>
                  <div className="text-sm text-gray-500 flex flex-wrap gap-2 mt-1">
                    <span>📅 {ev.date}</span>
                    {ev.time && <span>🕐 {ev.time}{ev.end_time ? `-${ev.end_time}` : ''}</span>}
                    {ev.location && <span>📍 {ev.location}</span>}
                  </div>
                </div>
                <div className="text-center flex-shrink-0 px-3">
                  <div className="text-xl font-bold text-primary">{ev.participant_count}</div>
                  <div className="text-xs text-gray-400">
                    {ev.max_participants > 0 ? `/ ${ev.max_participants}` : 'signed'}
                  </div>
                </div>
                <div className="flex gap-2 flex-shrink-0">
                  <button onClick={() => setViewParticipants(ev)}
                    className="px-3 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg transition font-semibold">
                    👥 View
                  </button>
                  <button onClick={() => { setEditEvent(ev); setShowForm(true); }}
                    className="px-3 py-2 text-sm bg-primary/10 text-primary hover:bg-primary/20 rounded-lg transition font-semibold">
                    ✏️ Edit
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}
      </main>

      {showForm && (
        <EventForm event={editEvent} onSave={handleSave} onDelete={handleSave} onClose={handleFormClose} />
      )}

      {viewParticipants && (
        <ParticipantsModal event={viewParticipants}
          onClose={() => setViewParticipants(null)}
          onRemove={() => { fetchEvents(); setViewParticipants(null); }} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
</script>
</body>
</html>
